<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Elements — Interactive 3D Periodic Table</title>
<meta name="description" content="Interactive Periodic Table with 3D atom viewer, temperature simulation, and element details.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-d:'Space Grotesk',-apple-system,sans-serif;
  --font-b:'Outfit',-apple-system,sans-serif;
  --bg:#f0f4f8;
  --card:rgba(255,255,255,0.72);
  --card-h:rgba(255,255,255,0.96);
  --modal:rgba(248,250,252,0.94);
  --bdr:rgba(15,23,42,0.1);
  --bdr-f:rgba(15,23,42,0.22);
  --txt:#0f172a;
  --txt2:#475569;
  --txt3:#64748b;
  --tr:all 0.22s cubic-bezier(.4,0,.2,1);
  --blur:blur(14px);
  --shadow:0 2px 14px rgba(15,23,42,0.07);
}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}

/* ── BACKGROUND ── */
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 65% 15%,#dbeafe 0%,#f0f4f8 50%,#fce7f3 100%)}
.bg-dots{position:fixed;inset:0;z-index:-1;
  background-image:radial-gradient(1px 1px at 30px 40px,rgba(15,23,42,.07),transparent),
    radial-gradient(1.5px 1.5px at 80px 90px,rgba(15,23,42,.05),transparent),
    radial-gradient(1px 1px at 140px 160px,rgba(15,23,42,.06),transparent),
    radial-gradient(2px 2px at 220px 70px,rgba(15,23,42,.04),transparent),
    radial-gradient(1px 1px at 310px 260px,rgba(15,23,42,.05),transparent);
  background-size:420px 420px;animation:drift 200s linear infinite}
@keyframes drift{from{background-position:0 0}to{background-position:420px 840px}}
.blob{position:fixed;border-radius:50%;filter:blur(110px);opacity:.22;pointer-events:none;z-index:-1}
.blob1{width:560px;height:560px;background:radial-gradient(#a78bfa,transparent 70%);top:-8%;right:-4%}
.blob2{width:560px;height:560px;background:radial-gradient(#7dd3fc,transparent 70%);bottom:-8%;left:-4%}

/* ── LAYOUT ── */
.app{max-width:1720px;margin:0 auto;padding:1.6rem 1.4rem;display:flex;flex-direction:column;gap:1.4rem}

/* ── HEADER ── */
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:1.2rem;border-bottom:1px solid var(--bdr)}
.logo h1{font-family:var(--font-d);font-size:1.9rem;font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,#1e3a5f 0%,#3b82f6 55%,#8b5cf6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:flex;align-items:center;gap:.65rem}
.logo h1 em{font-style:normal;font-size:.78rem;font-weight:600;padding:.18rem .48rem;
  border:1.5px solid #3b82f6;border-radius:6px;background:rgba(59,130,246,.1);
  color:#3b82f6;-webkit-text-fill-color:#3b82f6;letter-spacing:.05em}
.logo p{color:var(--txt2);font-size:.84rem;margin-top:.18rem}
.stats{display:flex;gap:.6rem;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--bdr);backdrop-filter:var(--blur);
  padding:.4rem .85rem;border-radius:8px;display:flex;align-items:center;gap:.4rem;
  font-size:.8rem;color:var(--txt2);box-shadow:var(--shadow)}
.stat strong{color:var(--txt);font-weight:700;font-size:.92rem}

/* ── CONTROLS ── */
.controls{background:var(--card);border:1px solid var(--bdr);border-radius:16px;
  padding:1.1rem 1.4rem;backdrop-filter:var(--blur);box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:1rem}
.ctrl-top{display:flex;gap:1.1rem;align-items:center;flex-wrap:wrap}
.search{flex:1;min-width:240px;position:relative}
.search svg{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--txt3);pointer-events:none}
.search input{width:100%;background:rgba(255,255,255,.55);border:1.5px solid var(--bdr);
  padding:.6rem .9rem .6rem 2.3rem;border-radius:10px;color:var(--txt);font-family:var(--font-b);
  font-size:.88rem;outline:none;transition:var(--tr)}
.search input::placeholder{color:var(--txt3)}
.search input:focus{border-color:#3b82f6;background:rgba(255,255,255,.92);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.temp-wrap{display:flex;align-items:center;gap:.85rem;min-width:290px;
  background:rgba(255,255,255,.55);border:1.5px solid var(--bdr);padding:.45rem .95rem;border-radius:10px}
.temp-lbl{font-size:.8rem;color:var(--txt2);font-weight:600;white-space:nowrap}
.temp-inner{display:flex;align-items:center;gap:.65rem;flex:1}
.temp-inner input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;
  background:linear-gradient(to right,#38bdf8,#f59e0b,#ef4444);outline:none;cursor:pointer}
.temp-inner input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#fff;border:2.5px solid #3b82f6;box-shadow:0 1px 6px rgba(0,0,0,.18);cursor:pointer;transition:transform .12s}
.temp-inner input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}
.temp-val{font-family:var(--font-d);font-size:.88rem;font-weight:700;color:#d97706;min-width:92px;text-align:right;white-space:nowrap}
.filters{display:flex;gap:.4rem;flex-wrap:wrap}
.fbtn{background:rgba(255,255,255,.6);border:1.5px solid var(--bdr);color:var(--txt2);
  padding:.32rem .75rem;border-radius:20px;cursor:pointer;font-family:var(--font-b);
  font-size:.75rem;font-weight:600;transition:var(--tr);white-space:nowrap}
.fbtn:hover{background:rgba(255,255,255,.92);color:var(--txt);transform:translateY(-1px)}

/* ── PERIODIC TABLE ── */
.pt-wrap{overflow-x:auto;padding-bottom:.4rem}
.pt-grid{display:grid;grid-template-columns:repeat(18,minmax(60px,1fr));
  grid-template-rows:repeat(10,minmax(72px,1fr));gap:5px;min-width:1180px}

/* ── ELEMENT CARDS ── */
.ecard{background:var(--card);border:1.5px solid var(--bdr);border-radius:8px;padding:5px 7px;
  display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;
  position:relative;transition:var(--tr);box-shadow:var(--shadow);overflow:hidden;user-select:none;
  backdrop-filter:blur(6px)}
.ecard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--stripe,#3b82f6);border-radius:8px 0 0 8px}
.ecard:hover{transform:translateY(-4px) scale(1.05);background:var(--card-h);
  border-color:var(--stripe,#3b82f6);
  box-shadow:0 14px 30px rgba(15,23,42,.13),0 0 0 1.5px var(--stripe,#3b82f6);z-index:5}
.ecard.dim{opacity:.15;filter:grayscale(80%);pointer-events:none}
.ecard.ph{border-style:dashed;opacity:.6;cursor:default}
.ecard.ph:hover{transform:none;cursor:default}
.ehdr{display:flex;justify-content:space-between;align-items:center}
.enum{font-family:var(--font-d);font-size:.62rem;font-weight:600;color:var(--txt2)}
.sbadge{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.esym{font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--txt);text-align:center;line-height:1;margin:1px 0}
.eftr{display:flex;flex-direction:column;align-items:center;gap:1px}
.ename{font-size:.58rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.emass{font-size:.5rem;color:var(--txt3);font-family:var(--font-d)}
.la-spacer{pointer-events:none}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.22);backdrop-filter:blur(4px);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .35s ease}
.overlay.open{opacity:1;pointer-events:all}

/* ── DRAWER ── */
.drawer{position:fixed;top:0;right:-55vw;width:50vw;min-width:360px;height:100%;
  background:var(--modal);border-left:1.5px solid var(--bdr);
  box-shadow:-8px 0 40px rgba(15,23,42,.1);z-index:101;backdrop-filter:var(--blur);
  transition:right .4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
@media(max-width:1100px){.drawer{width:82vw;right:-87vw}}
@media(max-width:768px){.drawer{width:100vw;right:-105vw}}
.drawer.open{right:0}
.d-hdr{padding:1.2rem 1.4rem;border-bottom:1.5px solid var(--bdr);
  display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.6)}
.d-left{display:flex;align-items:center;gap:.9rem}
.d-symbox{background:rgba(255,255,255,.85);width:58px;height:58px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-d);
  font-size:1.8rem;font-weight:700;border:2px solid #3b82f6;transition:var(--tr)}
.d-name{font-family:var(--font-d);font-size:1.35rem;font-weight:700;display:flex;align-items:center;gap:.45rem}
.d-name span{font-size:.82rem;font-weight:500;color:var(--txt2)}
.d-cat{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:.12rem}
.close-btn{background:rgba(255,255,255,.7);border:1.5px solid var(--bdr);border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--txt2);transition:var(--tr)}
.close-btn:hover{background:#fff;color:var(--txt);transform:scale(1.1)}
.d-body{flex:1;overflow-y:auto;padding:1.3rem;display:flex;flex-direction:column;gap:1.2rem}

/* ── ATOM VIEWER ── */
.viewer{position:relative;background:#080f1e;border-radius:14px;height:280px;overflow:hidden;
  border:1.5px solid rgba(255,255,255,.06);box-shadow:0 4px 24px rgba(0,0,0,.22)}
#atom-canvas{width:100%;height:100%;display:block}
.v-hint{position:absolute;bottom:.6rem;right:.7rem;font-size:.66rem;color:#94a3b8;
  background:rgba(8,15,30,.7);padding:.18rem .48rem;border-radius:4px}

/* ── FACTS ── */
.facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.55rem}
.fact{background:rgba(255,255,255,.72);border:1.5px solid var(--bdr);border-radius:10px;
  padding:.65rem .8rem;box-shadow:var(--shadow);transition:var(--tr)}
.fact:hover{background:rgba(255,255,255,.96);transform:translateY(-1px)}
.fact label{font-size:.65rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.2rem}
.fact span{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--txt)}
.fact .unit{font-size:.68rem;font-weight:400;color:var(--txt2);margin-left:.08rem}

/* ── DESCRIPTION ── */
.section h3{font-family:var(--font-d);font-size:.95rem;font-weight:700;color:var(--txt);
  border-bottom:1.5px solid var(--bdr);padding-bottom:.3rem;margin-bottom:.4rem}
.section p{font-size:.86rem;color:var(--txt2);line-height:1.65}

/* ── SHELLS ── */
.shells-box{background:rgba(255,255,255,.65);border:1.5px solid var(--bdr);border-radius:12px;padding:1rem 1.2rem;box-shadow:var(--shadow)}
.shell-item{display:flex;justify-content:space-between;align-items:center;
  font-size:.83rem;padding-bottom:.22rem;border-bottom:1px dashed var(--bdr)}
.shell-item:last-child{border-bottom:none;padding-bottom:0}
.shell-item label{color:var(--txt2);font-weight:500}
.shell-item span{font-family:var(--font-d);font-weight:700;padding:.08rem .4rem;border-radius:4px;background:rgba(15,23,42,.04)}

/* ── DISCOVERY ── */
.disc{background:linear-gradient(135deg,rgba(255,255,255,.8),rgba(240,244,248,.7));
  border:1.5px solid var(--bdr);border-radius:10px;padding:.8rem 1.05rem;
  display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
.disc-l label{font-size:.65rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.15rem}
.disc-l span{font-weight:700;color:var(--txt);font-size:.88rem}
.disc-yr{font-family:var(--font-d);font-weight:800;font-size:1.25rem;color:#d97706}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(15,23,42,.03)}
::-webkit-scrollbar-thumb{background:rgba(15,23,42,.16);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(15,23,42,.3)}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-dots"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="app">
  <header>
    <div class="logo">
      <h1>Aether Elements <em>3D</em></h1>
      <p>Interactive Periodic Table &amp; Atom Simulator</p>
    </div>
    <div class="stats">

      <div class="stat">💧 Liquid: <strong id="s-liquid">0</strong></div>

      <div class="stat">⚗️ Synthetic: <strong id="s-synth">0</strong></div>
    </div>
  </header>

  <div class="controls">
    <div class="ctrl-top">
      <div class="search">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="search" type="text" placeholder="Search by name, symbol, or number…" autocomplete="off">

    <div class="filters" id="filters"></div>
  </div>

  <div class="pt-wrap">

</div>

<!-- Detail drawer -->
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="d-hdr">

      </div>
    </div>
    <button class="close-btn" id="close-btn" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="d-body">
    <div class="viewer">
      <canvas id="atom-canvas"></canvas>
      <span class="v-hint">Click &amp; Drag to Rotate</span>
    </div>
    <div class="facts">
      <div class="fact"><label>Atomic Mass</label><span id="f-mass">—</span><span class="unit">u</span></div>
      <div class="fact"><label>Density</label><span id="f-density">—</span><span class="unit" id="f-dunit">g/cm³</span></div>
      <div class="fact"><label>Melting Pt.</label><span id="f-melt">—</span><span class="unit">K</span></div>
      <div class="fact"><label>Boiling Pt.</label><span id="f-boil">—</span><span class="unit">K</span></div>
      <div class="fact"><label>Electroneg.</label><span id="f-neg">—</span></div>
      <div class="fact"><label>State (sim.)</label><span id="f-state">solid</span></div>
    </div>
    <div class="section">
      <h3>Overview</h3>
      <p id="d-desc">—</p>
    </div>
    <div class="section">
      <h3>Electron Configuration</h3>
      <p id="d-config" style="font-family:var(--font-d);font-weight:600;color:#d97706;margin-bottom:.5rem">—</p>
      <div class="shells-box" id="d-shells"></div>
    </div>
    <div class="disc">
      <div class="disc-l">
        <label>Discovered By</label>
        <span id="d-disc">—</span>
      </div>
      <div class="disc-yr" id="d-year">—</div>
    </div>
  </div>
</div>

const CAT_LABELS = {
  "reactive-nonmetal":    "Reactive Nonmetals",
  "noble-gas":            "Noble Gases",
  "alkali-metal":         "Alkali Metals",
  "alkaline-earth-metal": "Alkaline Earths",
  "metalloid":            "Metalloids",
  "post-transition-metal":"Post-Transition",
  "transition-metal":     "Transition Metals",

const STATE_COLORS = {solid:"#94a3b8",liquid:"#38bdf8",gas:"#a855f7",synthetic:"#f59e0b"};

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
const S = {temp:298, cat:null, query:"", el:null};

// ═══════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const grid = $('pt-grid');
const filtersEl = $('filters');
const searchEl = $('search');
const tempEl = $('temp');
const tempValEl = $('temp-val');
const overlay = $('overlay');
const drawer = $('drawer');
const closeBtn = $('close-btn');

// ═══════════════════════════════════════════════
// CATEGORY FILTERS
// ═══════════════════════════════════════════════
function renderFilters() {
  // All button
  const all = document.createElement('button');
  all.className = 'fbtn';
  all.textContent = 'All Elements';
  all.id = 'fbtn-all';
  all.style.cssText = 'background:#3b82f6;border-color:#3b82f6;color:#fff';
  all.addEventListener('click', () => setCategory(null, all));
  filtersEl.appendChild(all);

  Object.keys(CAT_LABELS).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'fbtn';
    btn.textContent = CAT_LABELS[key];
    btn.dataset.cat = key;
    btn.addEventListener('click', () => setCategory(key, btn));
    filtersEl.appendChild(btn);
  });
}

function setCategory(cat, btn) {
  S.cat = cat;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.style.cssText = '';
  });
  const c = cat ? CAT_COLORS[cat] : '#3b82f6';
  btn.style.cssText = `background:${c};border-color:${c};color:#fff`;
  applyFilters();
}

// ═══════════════════════════════════════════════
// PERIODIC TABLE GRID
// ═══════════════════════════════════════════════
function renderGrid() {
  grid.innerHTML = '';

  // Lanthanide placeholder at row 6 col 3
  const lp = makeCard(null, 6, 3, 'lanthanide', '57–71', 'La-Lu', 'Lanthanides');
  grid.appendChild(lp);

  // Actinide placeholder at row 7 col 3
  const ap = makeCard(null, 7, 3, 'actinide', '89–103', 'Ac-Lr', 'Actinides');
  grid.appendChild(ap);

  // Spacer row 8
  const sp = document.createElement('div');
  sp.className = 'la-spacer';
  sp.style.gridRow = '8';
  sp.style.gridColumn = '1 / span 18';
  grid.appendChild(sp);

  // All elements
  ELEMENTS.forEach(el => {
    let row = el.period;
    let col = el.group;
    if (el.n >= 57 && el.n <= 71) { row = 9; col = el.n - 57 + 4; }
    else if (el.n >= 89 && el.n <= 103) { row = 10; col = el.n - 89 + 4; }

    const card = document.createElement('div');
    card.className = 'ecard';
    card.id = `el-${el.n}`;
    card.style.gridRow = row;
    card.style.gridColumn = col;
    const c = CAT_COLORS[el.cat] || '#94a3b8';
    card.style.setProperty('--stripe', c);
    card.innerHTML = `
      <div class="ehdr">
        <span class="enum">${el.n}</span>
        <div class="sbadge" id="sb-${el.n}" style="background:${STATE_COLORS.solid};box-shadow:0 0 5px ${STATE_COLORS.solid}"></div>
      </div>
      <div class="esym">${el.sym}</div>
      <div class="eftr">
        <span class="ename">${el.name}</span>
        <span class="emass">${el.mass.toFixed ? el.mass.toFixed(2) : el.mass}</span>
      </div>`;
    card.addEventListener('click', () => openDetail(el));
    grid.appendChild(card);
  });

  updateStates();
}

function makeCard(el, row, col, cat, num, sym, name) {
  const card = document.createElement('div');
  card.className = 'ecard ph';
  card.style.gridRow = row;
  card.style.gridColumn = col;
  const c = CAT_COLORS[cat] || '#94a3b8';
  card.style.setProperty('--stripe', c);
  card.innerHTML = `
    <div class="ehdr"><span class="enum" style="font-size:.55rem">${num}</span></div>
    <div class="esym" style="font-size:1rem;color:var(--txt2)">${sym}</div>
    <div class="eftr"><span class="ename">${name}</span></div>`;
  return card;
}

// ═══════════════════════════════════════════════
// TEMPERATURE / STATES
// ═══════════════════════════════════════════════
function getState(el, temp) {
  if (el.mp === null && el.bp === null) return 'synthetic';
  if (temp < el.mp) return 'solid';
  if (el.bp === null || temp < el.bp) return 'liquid';
  return 'gas';
}

function updateStates() {
  let counts = {solid:0, liquid:0, gas:0, synthetic:0};
  ELEMENTS.forEach(el => {
    const st = getState(el, S.temp);
    counts[st]++;
    const badge = $(`sb-${el.n}`);
    if (badge) {
      const c = STATE_COLORS[st];
      badge.style.background = c;
      badge.style.boxShadow = `0 0 5px ${c}`;
    }
  });
  $('s-solid').textContent = counts.solid;
  $('s-liquid').textContent = counts.liquid;
  $('s-gas').textContent = counts.gas;
  $('s-synth').textContent = counts.synthetic;
  tempValEl.textContent = `${S.temp} K | ${Math.round(S.temp - 273.15)}°C`;
}

// ═══════════════════════════════════════════════
// FILTER / SEARCH
// ═══════════════════════════════════════════════
function applyFilters() {
  const q = S.query.toLowerCase().trim();
  ELEMENTS.forEach(el => {
    const card = $(`el-${el.n}`);
    if (!card) return;
    const matchQ = !q || el.name.toLowerCase().includes(q) || el.sym.toLowerCase().includes(q) || String(el.n) === q;
    const matchC = !S.cat || el.cat === S.cat;
    card.classList.toggle('dim', !(matchQ && matchC));
  });
}

// ═══════════════════════════════════════════════
// DETAIL DRAWER
// ═══════════════════════════════════════════════
function openDetail(el) {
  S.el = el;
  const c = CAT_COLORS[el.cat] || '#3b82f6';

  // Header
  const sym = $('d-sym');
  sym.textContent = el.sym;
  sym.style.borderColor = c;
  sym.style.boxShadow = `0 0 18px ${c}55`;
  sym.style.color = c;
  $('d-name').innerHTML = `${el.name} <span>#${el.n}</span>`;
  const cat = $('d-cat');
  cat.textContent = CAT_LABELS[el.cat] || el.cat;
  cat.style.color = c;

  // Facts
  $('f-mass').textContent = el.mass;
  if (el.den === null) { $('f-density').textContent = 'Unknown'; $('f-dunit').style.display='none'; }
  else { $('f-density').textContent = el.den; $('f-dunit').style.display=''; }
  $('f-melt').textContent = el.mp !== null ? el.mp : 'Unknown';
  $('f-boil').textContent = el.bp !== null ? el.bp : 'Unknown';
  $('f-neg').textContent = el.en !== null ? el.en.toFixed(2) : 'N/A';
  const st = getState(el, S.temp);
  const fst = $('f-state');
  fst.textContent = st;
  fst.style.color = STATE_COLORS[st];

  // Description
  $('d-desc').textContent = el.sum;
  $('d-config').textContent = el.cfg;

  // Shells
  const shellLabels = ['K','L','M','N','O','P','Q'];
  const shellsEl = $('d-shells');
  shellsEl.innerHTML = '';
  el.shells.forEach((count, i) => {
    const div = document.createElement('div');
    div.className = 'shell-item';
    div.innerHTML = `<label>Shell ${i+1} (${shellLabels[i]||'?'})</label><span style="color:${c}">${count} e⁻</span>`;
    shellsEl.appendChild(div);
  });

  // Discovery
  $('d-disc').textContent = el.disc;
  $('d-year').textContent = el.yr;

  // Open
  overlay.classList.add('open');
  drawer.classList.add('open');

  // Start atom viewer
  viewer.load(el, c);
  viewer.start();

  // Resize canvas properly after drawer opens
  setTimeout(() => { viewer.resize(); }, 50);
}

function closeDetail() {
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  viewer.stop();
  S.el = null;
}

// ═══════════════════════════════════════════════
// 2D CANVAS ATOM VIEWER
// ═══════════════════════════════════════════════
class AtomViewer {
  constructor() {
    this.canvas = $('atom-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.el = null;
    this.color = '#3b82f6';
    this.animId = null;
    this.t = 0;
    this.orbits = [];
    this.drag = false;
    this.rotX = 0.4;
    this.rotY = 0;
    this.lastMX = 0;
    this.lastMY = 0;

    // Drag to rotate
    this.canvas.addEventListener('mousedown', e => { this.drag=true; this.lastMX=e.clientX; this.lastMY=e.clientY; });
    window.addEventListener('mouseup', () => this.drag=false);
    window.addEventListener('mousemove', e => {
      if (!this.drag) return;
      this.rotY += (e.clientX - this.lastMX) * 0.008;
      this.rotX += (e.clientY - this.lastMY) * 0.006;
      this.rotX = Math.max(-1.2, Math.min(1.2, this.rotX));
      this.lastMX = e.clientX; this.lastMY = e.clientY;
    });
    // Touch
    this.canvas.addEventListener('touchstart', e => { this.drag=true; this.lastMX=e.touches[0].clientX; this.lastMY=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
    window.addEventListener('touchend', () => this.drag=false);
    window.addEventListener('touchmove', e => {
      if (!this.drag) return;
      this.rotY += (e.touches[0].clientX - this.lastMX) * 0.008;
      this.rotX += (e.touches[0].clientY - this.lastMY) * 0.006;
      this.rotX = Math.max(-1.2, Math.min(1.2, this.rotX));
      this.lastMX = e.touches[0].clientX; this.lastMY = e.touches[0].clientY;
    }, {passive:true});
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    this.canvas.width = Math.floor(rect.width);
    this.canvas.height = Math.floor(rect.height) || 280;
  }

  load(el, color) {
    this.el = el;
    this.color = color;
    this.orbits = [];
    this.t = 0;
    this.rotX = 0.38;
    this.rotY = 0;

    el.shells.forEach((count, si) => {
      const radius = 32 + si * 28;
      const speed = (si === 0 ? 1.1 : 0.85 / Math.sqrt(si+1)) * (Math.random()>.5?1:-1);
      const electrons = [];
      for (let i = 0; i < count; i++) {
        electrons.push({ angle: (2 * Math.PI * i) / count, speed });
      }
      // tilt angles for each shell (to look 3D)
      const tiltX = (si * 0.52 + 0.1) % Math.PI;
      const tiltZ = (si * 0.35) % Math.PI;
      this.orbits.push({ radius, electrons, tiltX, tiltZ });
    });
  }

  // Project 3D point to 2D with camera rotation
  project(x, y, z) {
    // Rotate around Y axis
    const cosY = Math.cos(this.rotY), sinY = Math.sin(this.rotY);
    const x1 = x * cosY - z * sinY;
    const z1 = x * sinY + z * cosY;
    // Rotate around X axis
    const cosX = Math.cos(this.rotX), sinX = Math.sin(this.rotX);
    const y2 = y * cosX - z1 * sinX;
    const z2 = y * sinX + z1 * cosX;
    // Simple perspective
    const fov = 500;
    const scale = fov / (fov + z2 + 200);
    const cx = this.canvas.width / 2;
    const cy = this.canvas.height / 2;
    return { sx: cx + x1 * scale, sy: cy + y2 * scale, z: z2, sc: scale };
  }

  draw() {
    const { canvas, ctx, t, orbits, color, el } = this;
    if (!el) return;
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Background
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
    bg.addColorStop(0, '#0d1628');
    bg.addColorStop(1, '#05090f');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Draw orbit rings and electrons
    orbits.forEach((orbit, si) => {
      const { radius, electrons, tiltX, tiltZ } = orbit;
      const steps = 72;
      const pts = [];
      for (let i = 0; i <= steps; i++) {
        const a = (2 * Math.PI * i) / steps;
        // Orbit plane: rotate base circle by tiltX around X and tiltZ around Z
        let x = radius * Math.cos(a);
        let y = radius * Math.sin(a) * Math.cos(tiltX);
        let z = radius * Math.sin(a) * Math.sin(tiltX);
        // Rotate by tiltZ around Z
        const cx2 = x * Math.cos(tiltZ) - y * Math.sin(tiltZ);
        const cy2 = x * Math.sin(tiltZ) + y * Math.cos(tiltZ);
        pts.push(this.project(cx2, cy2, z));
      }

      // Draw ring
      ctx.beginPath();
      pts.forEach((p, i) => { i===0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy); });
      ctx.closePath();
      ctx.strokeStyle = color + '44';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Draw electrons
      electrons.forEach(e => {
        const a = e.angle + t * e.speed;
        let x = radius * Math.cos(a);
        let y = radius * Math.sin(a) * Math.cos(tiltX);
        let z = radius * Math.sin(a) * Math.sin(tiltX);
        const cx2 = x * Math.cos(tiltZ) - y * Math.sin(tiltZ);
        const cy2 = x * Math.sin(tiltZ) + y * Math.cos(tiltZ);
        const p = this.project(cx2, cy2, z);
        const r = Math.max(2.5, 4 * p.sc);

        // Glow
        const eg = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r * 3.5);
        eg.addColorStop(0, '#fff');
        eg.addColorStop(0.3, '#22d3ee');
        eg.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, r * 3.5, 0, Math.PI*2);
        ctx.fillStyle = eg;
        ctx.fill();

        // Core
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
        ctx.fillStyle = '#22d3ee';
        ctx.fill();
      });
    });

    // Nucleus glow
    const pulse = 1 + 0.04 * Math.sin(t * 2.5);
    const nR = Math.min(10 + el.n * 0.07, 20) * pulse;
    const ng = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, nR * 2.8);
    ng.addColorStop(0, '#ffffff');
    ng.addColorStop(0.25, color);
    ng.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(W/2, H/2, nR * 2.8, 0, Math.PI*2);
    ctx.fillStyle = ng;
    ctx.fill();

    // Nucleus solid
    const ns = ctx.createRadialGradient(W/2 - nR*0.28, H/2 - nR*0.28, 0, W/2, H/2, nR);
    ns.addColorStop(0, '#fff');
    ns.addColorStop(0.45, color);
    ns.addColorStop(1, '#0d1628');
    ctx.beginPath();
    ctx.arc(W/2, H/2, nR, 0, Math.PI*2);
    ctx.fillStyle = ns;
    ctx.fill();

    // Symbol
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(7, Math.floor(nR * 0.88))}px 'Space Grotesk', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(el.sym, W/2, H/2);
  }

  tick() {
    this.t += 0.016;
    if (!this.drag) this.rotY += 0.003;
    this.draw();
    this.animId = requestAnimationFrame(() => this.tick());
  }

  start() { this.stop(); this.tick(); }
  stop() { if (this.animId) { cancelAnimationFrame(this.animId); this.animId = null; } }
}

const viewer = new AtomViewer();

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function bindEvents() {
  searchEl.addEventListener('input', e => { S.query = e.target.value; applyFilters(); });
  tempEl.addEventListener('input', e => {
    S.temp = parseInt(e.target.value);
    updateStates();
    if (S.el) {
      const st = getState(S.el, S.temp);
      const fst = $('f-state');
      fst.textContent = st;
      fst.style.color = STATE_COLORS[st];
    }
  });
  closeBtn.addEventListener('click', closeDetail);
  overlay.addEventListener('click', closeDetail);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
  window.addEventListener('resize', () => { if (S.el) viewer.resize(); });
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
renderFilters();
renderGrid();
bindEvents();
</script>
